# pnpm v11：依赖构建策略与 overrides 放在此文件（不再使用 package.json 的 pnpm 字段）
# CI 使用 pnpm 11；须显式声明 allowBuilds，否则 ignored 脚本会触发 ERR_PNPM_IGNORED_BUILDS
#
# minimumReleaseAge：新包发布后需等待一段时间才允许安装（防供应链投毒）。
# 博客主依赖 Astro 常随 ^6 升到刚发布的补丁版，排除以免 CI 在「未满龄」时失败。
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - astro
  - "@astrojs/*"

overrides:
  "@minify-html/node": "0.18.1"

allowBuilds:
  esbuild: false
  sharp: false
