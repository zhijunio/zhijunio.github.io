name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci

  publish-cdn:
    name: CDN images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect image changes
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only HEAD^ HEAD | grep -qE '^(public/images/|public/favicon\.ico|public/og\.webp|scripts/convert-to-webp\.mjs)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: WebP + commit + R2
        if: steps.detect.outputs.run == 'true'
        env:
          RCLONE_CONFIG: ${{ secrets.RCLONE_CONFIG }}
        run: |
          pnpm run convert-to-webp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/images
          if ! git diff --cached --quiet; then
            git commit -m "chore(图片): 自动转换 webp [skip ci]"
            git push
          fi
          if [[ -z "${RCLONE_CONFIG}" ]]; then
            echo "::error::缺少 Secret: RCLONE_CONFIG"
            exit 1
          fi
          mkdir -p ~/.config/rclone
          printf '%s\n' "${RCLONE_CONFIG}" > ~/.config/rclone/rclone.conf
          chmod 600 ~/.config/rclone/rclone.conf
          curl -fsSL https://rclone.org/install.sh | sudo bash
          pnpm run images:sync
