name: Fetch Keep Running data

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        type: choice
        options: [incremental, full]
        default: incremental

permissions:
  contents: write

concurrency:
  group: running-sync
  cancel-in-progress: true

jobs:
  sync:
    name: Fetch Keep → running.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: scripts/requirements-keep.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements-keep.txt

      - name: Determine sync mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=incremental" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.mode }}" = "full" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
          fi

      - name: Generate running.json from Keep API
        env:
          KEEP_MOBILE: ${{ secrets.KEEP_MOBILE }}
          KEEP_PASSWORD: ${{ secrets.KEEP_PASSWORD }}
          MAX_HR: ${{ vars.MAX_HR || 180 }}
        run: |
          if [ -z "${KEEP_MOBILE:-}" ] || [ -z "${KEEP_PASSWORD:-}" ]; then
            echo "::error::Configure repository secrets KEEP_MOBILE and KEEP_PASSWORD (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          MODE="${{ steps.mode.outputs.mode }}"
          if [ "$MODE" = "full" ]; then
            echo "模式: 全量获取 (分页获取所有记录)"
            python scripts/fetch-keep-run.py --mode full
          else
            echo "模式: 增量获取 (10 条)"
            python scripts/fetch-keep-run.py --mode incremental --limit 10
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add public/data/running.json
          if git diff --staged --quiet; then
            echo "No changes to running.json"
          else
            git commit -m "chore: fetch running.json from Keep"
            git push
          fi
